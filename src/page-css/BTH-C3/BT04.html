<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài số 4</title>
    <style>
        @keyframes colorBanner {
            0% {
                background-color: red;
                font-size: small;
            }

            25% {
                background-color: yellow;
                font-size: large;
            }

            50% {
                background-color: purple;
                font-size: xx-large;
            }

            75% {
                background-color: green;
                font-size: large;
            }

            100% {
                background-color: red;
                font-size: small;
            }
        }

        @keyframes picOne {
            0% {background-image: url(../../../assets/images/css.jpg);}
            25% {background-image: url(../../../assets/images/html.jpg);}
            50% {background-image: url(../../../assets/images/javascript.jpg);}
            75% {background-image: url(../../../assets/images/jquery.jpg);}
            100% {background-image: url(../../../assets/images/css.jpg);}
        }

        @keyframes picFour {
            0% {rotate: 0deg;}
            100% {rotate: 360deg;}
        }

        * {
            margin: 0 auto;
            font-family: Arial, Helvetica, sans-serif;
        }

        .banner {
            background-color: red;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100px;
            animation-name: colorBanner;
            animation-duration: 5s;
            animation-iteration-count: infinite;
        }

        .picture-holder {
            min-height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .picture1,
        .picture2,
        .picture3,
        .picture4 {
            background-color: aqua;
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: yellow;
            font-size: 40px;
        }

        .picture1 {
            border: 5px solid red;
            overflow: hidden;
            background-image: url(../../../assets/images/css.jpg);
            animation-name: picOne;
            animation-duration: 5s;
            animation-iteration-count: infinite;
        }

        .picture2 {
            border: 5px dashed blue;
            border-top-right-radius: 20px;
            border-bottom-left-radius: 20px;
        }

        .picture3 {
            border: 5px dotted purple;
            border-top-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        .picture4 {
            rotate: 180deg;
            font-size: larger;
            color: yellowgreen;
            border: 5px solid yellowgreen;
            animation: picFour 5s infinite;
        }
    </style>
</head>

<body>
    <div class="banner">
        <h2 style="text-transform: uppercase;">Banner</h2>
    </div>

    <div class="picture-holder">
        <div class="picture1">
            <p">1</p>
        </div>
        <div class="picture2">
            <p>2</p>
        </div>
        <div class="picture3">
            <p>3</p>
        </div>
        <div class="picture4">
            <p">Rotate</p>
        </div>
    </div>

    <br><a href="../css.html">Về danh sách chương</a>
</body>

</html>
