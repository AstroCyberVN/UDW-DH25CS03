<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài số 5</title>
    <style>
        * {
            margin: 0 auto;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(to right, rgb(20, 21, 21), rgb(20, 21, 21));
        }

        nav {
            background-color: linear-gradient(to right, rgb(20, 21, 21), rgb(20, 21, 21));
            display: flex;
            justify-content: center;
            align-items: center;
            height: 50px;
        }

        nav .title {
            padding-left: 20px;
            width: 100%;
        }

        .right-nav {
            width: 400px;
            display: flex;
            justify-content: flex-end;
        }

        .right-nav ul {
            display: flex;
        }

        .right-nav ul li {
            padding-right: 20px;
        }

        .right-nav ul li a {
            text-decoration: none;
            color: white;
        }

        .top-video-holder {
            position: relative;
            text-align: center;
        }

        .top-video-title {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
        }

        .content-holder h3 {
            color: white;
            margin-top: 40px;
            margin-left: 20px;
        }

        .content-holder ul {
            display: inline-flex;
            list-style-type: none;
            padding: 0;
            margin-top: 20px;
        }

        .content-holder ul li {
            padding-left: 20px;
        }

        .content-holder ul li img {
            width: 200px;
            height: 300px;
            object-fit: fill;

            border-radius: 10px;
            box-shadow: 2px 2px 10px rgb(20, 21, 21);
            transition: .2s;
        }

        .content-holder ul li img:hover {
            transform: scale(1.1);
            box-shadow: 2px 2px 10px aqua;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <nav>
        <h2 class="title" style="text-transform: uppercase; color: red;">Netflix</h2>
        <div class="right-nav">
            <ul>
                <li><a href="http://">Trang chủ</a></li>
                <li><a href="http://">Phim</a></li>
                <li><a href="http://">Thể loại</a></li>
            </ul>
        </div>
    </nav>
    
    <div class="top-video-holder">
        <img src="../../../assets/images/netflix-2.jpg" alt="NETFLIX" style="width: 100%; height: 200px; object-fit: fill;">
        <div class="top-video-title"><h1>Phim nổi bật hôm nay</h1></div>
    </div>

    <div class="content-holder">
        <h3>Xu hướng</h3>
        <ul>
            <li><img src="../../../assets/images/project-power.jpg" alt=""></li>
            <li><img src="../../../assets/images/annihilation.jpg" alt=""></li>
            <li><img src="../../../assets/images/swrod-of-destiny.jpg" alt=""></li>
            <li><img src="../../../assets/images/stranger-things.jpg" alt=""></li>
            <li><img src="../../../assets/images/carry-on.jpg" alt=""></li>
        </ul>
    </div>

    <div class="content-holder">
        <h3>Mới phát hành</h3>
        <ul>
            <li><img src="../../../assets/images/project-power.jpg" alt=""></li>
            <li><img src="../../../assets/images/annihilation.jpg" alt=""></li>
            <li><img src="../../../assets/images/swrod-of-destiny.jpg" alt=""></li>
            <li><img src="../../../assets/images/stranger-things.jpg" alt=""></li>
            <li><img src="../../../assets/images/carry-on.jpg" alt=""></li>
        </ul>
    </div>

    <br><a href="../css.html">Về danh sách chương</a>
</body>
</html>
