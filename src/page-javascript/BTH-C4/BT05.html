<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài số 5</title>
    <style>
        * {
            text-align: center;
        }

        #text {
            margin: 0;
            position: relative;
            white-space: nowrap;
        }

        p {
            text-align: right;
            white-space: nowrap;
        }

        input {
            width: 70%;
            text-align: left;
            padding-left: 10px;
        }
    </style>
</head>
<body style="justify-self: center;">
    <h1 id="text">Chương trình xử lí chuỗi</h1>
    <script>
        let text = document.getElementById("text");
        let x = window.innerWidth;

        function moveText() {
            x -= 3;
            text.style.left = (x - window.innerWidth / 2) + "px";

            if (x < (window.innerWidth) / 2) { return }
            requestAnimationFrame(moveText);
        }

        moveText();
    </script>

    <div class="holder" style="width: 85%;">
        <p>Chuỗi 1: <input type="text" name="str" id="str1" value="     learNIng    javAscrIpt    iS     veRy     eAsy       "></p>
        <p>Chuỗi 2: <input type="text" name="str" id="str2" value="     jAVaScRIPt       "></p>
        <p>Chuỗi 3: <input type="text" name="str" id="str3" value="     JQUERy        "></p>
        <p>Vị trí chèn: <input type="number" name="pos" id="pos" value="9"></p>
    </div>

    <button id="chuanHoa">Chuẩn hóa chuỗi</button>
    <button id="daoChuoi">Đảo chuỗi</button>
    <button id="khoiPhuc">Khôi phục</button>
    <button id="repS2toS3">Thay thế S2 bằng S3</button>
    <button id="S2intoS1">Chèn S2 vào S1</button>
    <button id="delS2inS1">Xóa S2 trong S1</button>

    <script>
        let chuanHoa = document.getElementById('chuanHoa');
        let daoChuoi = document.getElementById('daoChuoi');
        let khoiPhuc = document.getElementById('khoiPhuc');
        let repS2toS3 = document.getElementById('repS2toS3');
        let S2intoS1 = document.getElementById('S2intoS1');
        let delS2inS1 = document.getElementById('delS2inS1');

        let str = document.getElementsByName('str');

        var def = [];
        function saveChuoi() {
            for (let i = 0; i < str.length; i++) {
                def.push(str[i].value);
            }
        }
        saveChuoi()

        chuanHoa.onclick = function () {
            for (let i = 0; i < str.length; i++) {
                let element = str[i].value;

                element = element.trim().replace(/\s+/g, " ");

                element = element
                    .toLowerCase()
                    .split(" ")
                    .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                    .join(" ");
                
                str[i].value = element;
            }
        }

        daoChuoi.onclick = function () {
            for (let i = 0; i < str.length; i++) {
                let element = str[i].value;

                element = element.split(" ").reverse().join(" ");
                
                str[i].value = element;
            }
        }

        repS2toS3.onclick = function () {
            let firstStr = document.getElementById('str1').value;
            let secondStr = document.getElementById('str2').value;
            let thirdStr = document.getElementById('str3').value;

            let regex = new RegExp(secondStr.trim(), "gi");
            firstStr = firstStr.replace(regex, thirdStr.trim());

            document.getElementById('str1').value = firstStr;
        }

        S2intoS1.onclick = function () {
            let firstStr = document.getElementById('str1').value;
            let secondStr = document.getElementById('str2').value;
            let pos = document.getElementById('pos').value;

            if (pos === "") {
                alert("Vui lòng nhập vị trí chèn!");
                return;
            }

            pos = Number(pos);

            if (pos < 0 || pos > firstStr.length) {
                alert("Vị trí chèn không hợp lệ!");
                return;
            }

            firstStr = firstStr.slice(0, pos) + secondStr + firstStr.slice(pos);

            document.getElementById('str1').value = firstStr;
        }

        delS2inS1.onclick = function () {
            let firstStr = document.getElementById('str1').value;
            let secondStr = document.getElementById('str2').value;

            if (secondStr.trim() === "") {
                alert("Chuỗi S2 không được để trống!");
                return;
            }

            let regex = new RegExp(secondStr, "gi");
            firstStr = firstStr.replace(regex, "");

            document.getElementById('str1').value = firstStr;
        }

        khoiPhuc.onclick = function () {
            for (let i = 0; i < str.length; i++) {
                str[i].value = def[i];
            }
        }
    </script>

    <br><a href="../javascript.html">Về danh sách chương</a>
</body>
</html>
