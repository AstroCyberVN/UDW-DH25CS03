<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài số 2</title>
</head>
<body>
    <h1 id="result"></h1>

    <button id="start" onclick="start()">START</button>
    <button id="clock" onclick="clock()">Xem ngày giờ</button>
    <button id="reset" onclick="reset()">Reset</button>

    <script>
        function start() {
            let month = prompt("Nhập tháng:");
            let year = prompt("Nhập năm:", 2000);
            console.log(month, year);

            function findDayInMonth(month, year) {
                var flag = ((year % 4) == 0 && ((year % 100) != 0 || (year % 400) == 0));
                return [31, (flag ? 29: 28), 31, 30, 31, 30, 31, 31, 30, 31, 30, 31][month - 1];
            }

            let result = document.getElementById('result');
            result.innerHTML += `<br> Tháng ${month} năm ${year} có ${findDayInMonth(month, year)} ngày`
        }

        function clock() {
            let result = document.getElementById('result');
            let date = new Date();
            result.innerHTML += `<br> Hôm nay, thứ ${date.getDay()} ngày ${date.toLocaleDateString('vi-VN')}`;
            result.innerHTML += `<br> ${date.toLocaleTimeString('vi-VN')}`;
        }

        function reset() {
            document.getElementById('result').innerHTML = "";
        }
    </script>

    <br><a href="../javascript.html">Về danh sách chương</a>
</body>
</html>
