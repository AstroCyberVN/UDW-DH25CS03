<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài số 7</title>
    <style>
        * {
            margin: 0 auto;
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
        }

        td {
            border: 1px solid black;
        }

        textarea {
            width: 98%;
            min-height: 100px;
        }
    </style>
</head>
<body>
    <form action="" id="registerForm">
        <table>
            <tr>
                <th colspan="2"><p style="text-transform: uppercase; margin-block: 5px 10px;">Đăng ký thành viên</p></th>
            </tr>
            <tr>
                <td>Tên đăng nhập</td>
                <td><input type="text" name="username" id="username"></td>
            </tr>
            <tr>
                <td>Mật khẩu</td>
                <td><input type="password" name="password" id="password"></td>
            </tr>
            <tr>
                <td>Ngày sinh</td>
                <td><input type="date" name="birthday" id="birthday"></td>
            </tr>
            <tr>
                <td>Giới tính</td>
                <td>
                    <input type="radio" name="gender" id="male" checked value="Nam"> Nam 
                    <input type="radio" name="gender" id="female" value="Nữ"> Nữ
                </td>
            </tr>
            <tr>
                <td>Vấn đề bạn quan tâm</td>
                <td><select name="problems" id="problems">
                    <option value="">Kinh tế</option>
                    <option value="">Thể thao</option>
                    <option value="">Văn học nghệ thuật</option>
                </select></td>
            </tr>
            <tr>
                <td><input type="submit" value="Đăng ký"></td>
                <td><input type="reset" value="Hủy"></td>
            </tr>
            <tr>
                <td colspan="2"><textarea name="text" id="text"></textarea></td>
            </tr>
        </table>
    </form>

    <script>
        let form = document.getElementById('registerForm');
        let result = document.getElementById('text');

        function getAge(dateString) {
            var today = new Date();
            var birthDate = new Date(dateString);
            var age = today.getFullYear() - birthDate.getFullYear();
            var m = today.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
                age--;
            }
            return age;
        }

        form.addEventListener('submit', function (event) {
            result.innerHTML = "";
            result.innerHTML += "Chào mừng " + document.getElementById('username').value + '\n';
            result.innerHTML += "Bạn là " + document.querySelector('input[name="gender"]:checked').value + '\n';
            result.innerHTML += `Mật khẩu của bạn có ${document.getElementById('password').value.length} ký tự\n`;
            result.innerHTML += `Tuổi bạn là ${getAge(document.getElementById('birthday').value)} tuổi\n`;

            const select = document.querySelector('select[name="problems"]');
            result.innerHTML += `Vấn đề bạn quan tâm là ${select.options[select.selectedIndex].text}\n`;

            event.preventDefault();
        })
    </script>

    <br><a href="../javascript.html">Về danh sách chương</a>
</body>
</html>
